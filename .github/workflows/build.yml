name: Build Windows Electron App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🟢 Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Instalar dependências
        run: npm ci --ignore-scripts

      - name: 🔎 Verificar driver SQLite ativo
        shell: bash
        run: |
          npm ls better-sqlite3
          if npm ls sqlite3 >/dev/null 2>&1; then
            echo "❌ sqlite3 encontrado nas dependências. A build deve usar apenas better-sqlite3."
            exit 1
          fi

      - name: 🔧 Rebuild de dependências nativas (Electron)
        run: npm run postinstall

      - name: ⚛️ Build React (Vite)
        run: npm run build

      - name: Escrever senha mestre para o instalador (opcional)
        shell: bash
        env:
          BIZCONTROL_MASTER_PASSWORD: ${{ secrets.BIZCONTROL_MASTER_PASSWORD }}
        run: |
          if [ -n "${BIZCONTROL_MASTER_PASSWORD:-}" ]; then
            printf '%s' "$BIZCONTROL_MASTER_PASSWORD" > electron/.registration-secret
            echo "Secret BIZCONTROL_MASTER_PASSWORD aplicado ao pacote."
          else
            echo "::warning::Defina o secret BIZCONTROL_MASTER_PASSWORD no repositório para o primeiro registo funcionar no .exe."
          fi

      - name: 🖥️ Build Electron Windows
        run: npm run dist:win

      - name: 📤 Upload do executável
        uses: actions/upload-artifact@v4
        with:
          name: BizControl-Windows
          path: release