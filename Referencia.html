<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #0a0e17;
        --bg2: #111827;
        --bg3: #1a2236;
        --bg4: #1e2d45;
        --accent: #00d4aa;
        --accent2: #0096ff;
        --accent3: #ff6b35;
        --text: #e8edf5;
        --text2: #8fa3c0;
        --text3: #4a6080;
        --border: #1e3050;
        --border2: #2a4060;
        --red: #ff4757;
        --green: #00d4aa;
        --amber: #ffb142;
        --purple: #a55eea;
        --card-r: 12px;
        --sm-r: 8px;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        font-size: 14px;
        overflow-x: hidden;
      }
      h1,
      h2,
      h3,
      .syne {
        font-family: "Syne", sans-serif;
      }
      .hidden {
        display: none !important;
      }

      /* LOGIN */
      #login-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          ellipse at 30% 20%,
          #0d2040 0%,
          var(--bg) 60%
        );
      }
      .login-box {
        background: var(--bg2);
        border: 1px solid var(--border2);
        border-radius: 20px;
        padding: 48px 40px;
        width: 400px;
        max-width: 95vw;
      }
      .logo-area {
        text-align: center;
        margin-bottom: 36px;
      }
      .logo-icon {
        width: 56px;
        height: 56px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 12px;
        font-size: 24px;
      }
      .logo-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: var(--text);
      }
      .logo-sub {
        font-size: 12px;
        color: var(--text2);
        margin-top: 4px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .role-tabs {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
        margin-bottom: 24px;
      }
      .role-tab {
        padding: 10px 8px;
        border: 1px solid var(--border);
        border-radius: var(--sm-r);
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 12px;
        color: var(--text2);
      }
      .role-tab.active {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(0, 212, 170, 0.07);
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 12px;
        color: var(--text2);
        margin-bottom: 6px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: var(--sm-r);
        padding: 12px 14px;
        color: var(--text);
        font-size: 14px;
        outline: none;
        font-family: "DM Sans", sans-serif;
        transition: border 0.2s;
      }
      .form-group input:focus,
      .form-group select:focus {
        border-color: var(--accent);
      }
      .btn-primary {
        width: 100%;
        padding: 13px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border: none;
        border-radius: var(--sm-r);
        color: #fff;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        font-family: "Syne", sans-serif;
        letter-spacing: 0.5px;
        transition: opacity 0.2s;
      }
      .btn-primary:hover {
        opacity: 0.9;
      }
      .demo-hint {
        text-align: center;
        margin-top: 16px;
        font-size: 12px;
        color: var(--text3);
      }

      /* SHELL */
      #app-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        height: 58px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .topbar-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .topbar-logo {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 16px;
        color: var(--accent);
      }
      .topbar-company {
        font-size: 12px;
        color: var(--text2);
        background: var(--bg3);
        border: 1px solid var(--border);
        padding: 4px 10px;
        border-radius: 20px;
      }
      .topbar-user {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .user-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent2), var(--purple));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 600;
      }
      .user-info {
        text-align: right;
      }
      .user-name {
        font-size: 13px;
        font-weight: 500;
      }
      .user-role {
        font-size: 11px;
        color: var(--text2);
      }
      .btn-logout {
        background: none;
        border: 1px solid var(--border2);
        color: var(--text2);
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        font-family: "DM Sans", sans-serif;
      }
      .btn-logout:hover {
        border-color: var(--red);
        color: var(--red);
      }

      .main-layout {
        display: flex;
        flex: 1;
      }

      /* SIDEBAR */
      .sidebar {
        width: 220px;
        background: var(--bg2);
        border-right: 1px solid var(--border);
        padding: 20px 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex-shrink: 0;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: var(--sm-r);
        cursor: pointer;
        transition: all 0.2s;
        color: var(--text2);
        font-size: 13px;
      }
      .nav-item:hover {
        background: var(--bg3);
        color: var(--text);
      }
      .nav-item.active {
        background: rgba(0, 212, 170, 0.12);
        color: var(--accent);
        font-weight: 500;
      }
      .nav-icon {
        font-size: 16px;
        width: 20px;
        text-align: center;
      }
      .nav-section {
        font-size: 10px;
        letter-spacing: 1.5px;
        color: var(--text3);
        padding: 12px 12px 4px;
        text-transform: uppercase;
      }

      /* CONTENT */
      .content {
        flex: 1;
        padding: 28px;
        overflow-y: auto;
        min-width: 0;
      }
      .page {
        display: none;
      }
      .page.active {
        display: block;
      }

      .page-header {
        margin-bottom: 24px;
      }
      .page-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .page-sub {
        font-size: 13px;
        color: var(--text2);
        margin-top: 4px;
      }

      /* CARDS */
      .cards-row {
        display: grid;
        gap: 16px;
        margin-bottom: 24px;
      }
      .cards-row.cols2 {
        grid-template-columns: 1fr 1fr;
      }
      .cards-row.cols3 {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .cards-row.cols4 {
        grid-template-columns: 1fr 1fr 1fr 1fr;
      }
      .card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--card-r);
        padding: 20px;
      }
      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .card-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .metric {
        font-size: 28px;
        font-weight: 700;
        font-family: "Syne", sans-serif;
      }
      .metric-sub {
        font-size: 12px;
        color: var(--text2);
        margin-top: 4px;
      }
      .metric.green {
        color: var(--green);
      }
      .metric.amber {
        color: var(--amber);
      }
      .metric.red {
        color: var(--red);
      }
      .metric.blue {
        color: var(--accent2);
      }

      /* TABLE */
      .table-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th {
        background: var(--bg3);
        color: var(--text2);
        font-weight: 500;
        padding: 10px 14px;
        text-align: left;
        font-size: 11px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        border-bottom: 1px solid var(--border);
      }
      td {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        color: var(--text);
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: rgba(255, 255, 255, 0.02);
      }

      /* BADGE */
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 500;
      }
      .badge.green {
        background: rgba(0, 212, 170, 0.12);
        color: var(--green);
      }
      .badge.red {
        background: rgba(255, 71, 87, 0.12);
        color: var(--red);
      }
      .badge.amber {
        background: rgba(255, 177, 66, 0.12);
        color: var(--amber);
      }
      .badge.blue {
        background: rgba(0, 150, 255, 0.12);
        color: var(--accent2);
      }
      .badge.purple {
        background: rgba(165, 94, 234, 0.12);
        color: var(--purple);
      }

      /* FORMS */
      .form-row {
        display: grid;
        gap: 14px;
        margin-bottom: 14px;
      }
      .form-row.cols2 {
        grid-template-columns: 1fr 1fr;
      }
      .form-row.cols3 {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .field label {
        display: block;
        font-size: 11px;
        color: var(--text2);
        margin-bottom: 5px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .field input,
      .field select,
      .field textarea {
        width: 100%;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: var(--sm-r);
        padding: 10px 12px;
        color: var(--text);
        font-size: 13px;
        outline: none;
        font-family: "DM Sans", sans-serif;
        transition: border 0.2s;
      }
      .field input:focus,
      .field select:focus,
      .field textarea:focus {
        border-color: var(--accent);
      }
      .field select option {
        background: var(--bg3);
      }
      .btn {
        padding: 10px 18px;
        border-radius: var(--sm-r);
        border: none;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 500;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .btn-green {
        background: rgba(0, 212, 170, 0.15);
        color: var(--green);
        border: 1px solid rgba(0, 212, 170, 0.3);
      }
      .btn-green:hover {
        background: rgba(0, 212, 170, 0.25);
      }
      .btn-blue {
        background: rgba(0, 150, 255, 0.15);
        color: var(--accent2);
        border: 1px solid rgba(0, 150, 255, 0.3);
      }
      .btn-blue:hover {
        background: rgba(0, 150, 255, 0.25);
      }
      .btn-red {
        background: rgba(255, 71, 87, 0.1);
        color: var(--red);
        border: 1px solid rgba(255, 71, 87, 0.2);
      }
      .btn-red:hover {
        background: rgba(255, 71, 87, 0.2);
      }
      .btn-amber {
        background: rgba(255, 177, 66, 0.1);
        color: var(--amber);
        border: 1px solid rgba(255, 177, 66, 0.2);
      }
      .btn-sm {
        padding: 6px 12px;
        font-size: 12px;
      }

      /* PRODUCT GRID */
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 14px;
      }
      .product-card {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: var(--card-r);
        padding: 16px;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
      }
      .product-card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      .product-card.selected {
        border-color: var(--accent);
        background: rgba(0, 212, 170, 0.06);
      }
      .product-card.out-of-stock {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .product-card.out-of-stock:hover {
        transform: none;
        border-color: var(--border);
      }
      .prod-icon {
        font-size: 28px;
        margin-bottom: 8px;
      }
      .prod-name {
        font-weight: 500;
        font-size: 13px;
        margin-bottom: 4px;
      }
      .prod-price {
        color: var(--accent);
        font-weight: 600;
        font-size: 15px;
        font-family: "Syne", sans-serif;
      }
      .prod-stock {
        font-size: 11px;
        margin-top: 6px;
      }
      .stock-ok {
        color: var(--green);
      }
      .stock-low {
        color: var(--amber);
      }
      .stock-out {
        color: var(--red);
      }

      /* CART */
      .cart-area {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--card-r);
        padding: 20px;
      }
      .cart-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
      }
      .cart-item:last-child {
        border-bottom: none;
      }
      .qty-ctrl {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .qty-btn {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        background: var(--bg3);
        border: 1px solid var(--border2);
        color: var(--text);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }
      .qty-btn:hover {
        border-color: var(--accent);
      }

      /* MODAL */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .modal {
        background: var(--bg2);
        border: 1px solid var(--border2);
        border-radius: var(--card-r);
        padding: 28px;
        width: 480px;
        max-width: 95vw;
        max-height: 90vh;
        overflow-y: auto;
      }
      .modal-title {
        font-family: "Syne", sans-serif;
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 20px;
      }
      .modal-footer {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 20px;
      }

      /* CHART CONTAINER */
      .chart-container {
        position: relative;
        width: 100%;
        height: 240px;
      }
      .chart-container-sm {
        position: relative;
        width: 100%;
        height: 180px;
      }

      /* PROGRESS BAR */
      .progress-bar {
        height: 6px;
        background: var(--bg3);
        border-radius: 3px;
        overflow: hidden;
        margin-top: 6px;
      }
      .progress-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.3s;
      }

      /* ALERT CARD */
      .alert-card {
        border-radius: var(--sm-r);
        padding: 12px 16px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
      }
      .alert-amber {
        background: rgba(255, 177, 66, 0.08);
        border: 1px solid rgba(255, 177, 66, 0.2);
        color: var(--amber);
      }
      .alert-green {
        background: rgba(0, 212, 170, 0.08);
        border: 1px solid rgba(0, 212, 170, 0.2);
        color: var(--green);
      }
      .alert-red {
        background: rgba(255, 71, 87, 0.08);
        border: 1px solid rgba(255, 71, 87, 0.2);
        color: var(--red);
      }

      /* TOGGLE */
      .toggle {
        width: 40px;
        height: 22px;
        background: var(--bg3);
        border: 1px solid var(--border2);
        border-radius: 11px;
        position: relative;
        cursor: pointer;
        transition: background 0.2s;
      }
      .toggle.on {
        background: var(--accent);
      }
      .toggle::after {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        background: #fff;
        border-radius: 50%;
        top: 2px;
        left: 2px;
        transition: left 0.2s;
      }
      .toggle.on::after {
        left: 20px;
      }

      /* STAT PERIOD TABS */
      .period-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 20px;
      }
      .period-tab {
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
        border: 1px solid var(--border);
        color: var(--text2);
        transition: all 0.2s;
      }
      .period-tab.active {
        background: var(--accent);
        color: #0a0e17;
        border-color: var(--accent);
        font-weight: 600;
      }

      /* SUPER USER */
      .company-card {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: var(--card-r);
        padding: 20px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      /* RECEIPT */
      .receipt {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: var(--card-r);
        padding: 20px;
        font-size: 13px;
      }
      .receipt-row {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
      }
      .receipt-row:last-child {
        border-bottom: none;
        font-weight: 600;
        color: var(--accent);
        font-size: 15px;
      }

      /* PIE CHART */
      #pie-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
        font-size: 12px;
      }
      .pie-leg-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .pie-leg-dot {
        width: 10px;
        height: 10px;
        border-radius: 2px;
      }

      .tag {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 8px;
        font-size: 11px;
        color: var(--text2);
      }

      .divider {
        height: 1px;
        background: var(--border);
        margin: 20px 0;
      }

      .empty-state {
        text-align: center;
        padding: 40px;
        color: var(--text2);
      }
      .empty-state .es-icon {
        font-size: 40px;
        margin-bottom: 12px;
      }

      /* NOTIFICATION DOT */
      .notif-dot {
        width: 7px;
        height: 7px;
        background: var(--red);
        border-radius: 50%;
        display: inline-block;
        margin-left: 4px;
      }

      @media (max-width: 700px) {
        .sidebar {
          width: 56px;
        }
        .nav-item span {
          display: none;
        }
        .nav-section {
          display: none;
        }
        .content {
          padding: 14px;
        }
        .cards-row.cols4,
        .cards-row.cols3 {
          grid-template-columns: 1fr 1fr;
        }
        .cards-row.cols2 {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- LOGIN -->
    <div id="login-screen">
      <div class="login-box">
        <div class="logo-area">
          <div class="logo-icon"><i class="fa-solid fa-chart-simple"></i></div>
          <div class="logo-title">BizController 360</div>
          <div class="logo-sub">Gestão de Stock & Vendas</div>
        </div>
        <div class="role-tabs">
          <div class="role-tab active" onclick="selectRole('vendedor')">
            Vendedor
          </div>
          <div class="role-tab" onclick="selectRole('gestor')">Gestor</div>
          <div class="role-tab" onclick="selectRole('super')">SuperUser</div>
        </div>
        <div class="form-group">
          <label>Utilizador</label>
          <input
            type="text"
            id="login-user"
            placeholder="ex: vendedor1"
            value="vendedor1"
          />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input
            type="password"
            id="login-pass"
            placeholder="••••••"
            value="1234"
          />
        </div>
        <button class="btn-primary" onclick="doLogin()">
          Entrar no Sistema
        </button>
        <div class="demo-hint">
          Demo: vendedor1/1234 | gestor1/1234 | super/1234

      function debounce(fn, wait) {
        let t;
        return (...a) => {
          clearTimeout(t);
          t = setTimeout(() => fn(...a), wait);
        };
      }
      window.fetchProductImage = async function () {
        const name = (document.getElementById("p-nome") || {}).value || "";
        const input = document.getElementById("p-image") || {};
        const preview = document.getElementById("p-image-preview");
        if (!preview || !input) return;
        let url = input.value && input.value.trim();
        if (!url && name) {
          // Use Unsplash source to get a representative image without API key
          url = `https://source.unsplash.com/400x300/?${encodeURIComponent(name)}`;
        }
        const saveBtn = document.getElementById("p-save-local");
        if (!url) {
          preview.style.display = "none";
          if (saveBtn) saveBtn.style.display = "none";
          return;
        }
        preview.src = url;
        preview.style.display = "block";
        if (saveBtn) saveBtn.style.display = "inline-flex";
        // store final url back to input
        input.value = url;
      };

        const nameEl = document.getElementById("p-nome");
        const auto = document.getElementById("p-autoimage");

        const deb = debounce(() => {
          if (auto.checked) fetchProductImage();

      // Save image to local disk (File System Access API with fallbacks)
      async function saveImageToDisk() {
        try {
          const url = (document.getElementById("p-image") || {}).value;
          if (!url) return alert("Nenhuma imagem para salvar");
          const resp = await fetch(url);
          if (!resp.ok) return alert("Falha ao baixar a imagem");
          const blob = await resp.blob();
          const nomeBase = (
            (document.getElementById("p-nome") || {}).value || "image"
          ).replace(/[^a-z0-9\-]/gi, "_");
          const ext = (blob.type.split("/")[1] || "png").split("+")[0];
          const fileName = `${nomeBase}.${ext}`;

          // Prefer showSaveFilePicker
          if (window.showSaveFilePicker) {
            const handle = await window.showSaveFilePicker({
              suggestedName: fileName,
              types: [
                { description: "Image", accept: { [blob.type]: ["." + ext] } },
              ],
            });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            alert("Imagem salva: " + handle.name);
            return;
          }

          // Fallback: showDirectoryPicker then write file
          if (window.showDirectoryPicker) {
            const dir = await window.showDirectoryPicker();
            const fh = await dir.getFileHandle(fileName, { create: true });
            const writable = await fh.createWritable();
            await writable.write(blob);
            await writable.close();
            alert("Imagem salva: " + fileName);
            return;
          }

          // Final fallback: trigger browser download
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(a.href);
          alert("Download iniciado: " + fileName);
        } catch (e) {
          console.error(e);
          alert("Erro ao salvar imagem: " + e.message);
        }
      }

      <thead><tr><th>Empresa</th><th>Plano</th><th>Estado</th><th>Expira</th><th>Receita/Ano</th><th>Acção</th></tr></thead>
      <tbody>${COMPANIES.map((c) => {
        const hoje = new Date("2026-05-04");
        const exp = new Date(c.expires);
        const dias = Math.round((exp - hoje) / (1000 * 60 * 60 * 24));
        const urgente = dias <= 30 && dias > 0;
        const expirado = dias < 0;
        return `<tr>
          <td><strong>${c.name}</strong></td>
          <td><span class="badge blue">${c.plan}</span></td>
          <td><span class="badge ${c.active ? "green" : "red"}">${c.active ? "Activa" : "Suspensa"}</span></td>
          <td style="color:${expirado ? "var(--red)" : urgente ? "var(--amber)" : "var(--text2)"}">
            ${c.expires} ${urgente ? `<span class="notif-dot"></span>` : ""} ${expirado ? "(Expirado)" : urgente ? `(${dias}d)` : ""}
          </td>
          <td style="color:var(--green)">${fmt(c.plan === "Anual" ? 3600 : 4800)}</td>
          <td><button class="btn btn-sm btn-blue" onclick="renovarSub(${c.id})">🔄 Renovar</button></td>
        </tr>`;
      }).join("")}
      </tbody>
    </table></div>
  </div>
  <div class="cards-row cols3" style="margin-top:20px">
    <div class="card"><div class="card-title">Receita Mensal Total</div><div class="metric green">${fmt(COMPANIES.filter((c) => c.active).reduce((s, c) => s + (c.plan === "Anual" ? 300 : 400), 0))}</div></div>
    <div class="card"><div class="card-title">Receita Anual Projectada</div><div class="metric blue">${fmt(COMPANIES.filter((c) => c.active).reduce((s, c) => s + (c.plan === "Anual" ? 3600 : 4800), 0))}</div></div>
    <div class="card"><div class="card-title">A expirar (30 dias)</div><div class="metric amber">${
      COMPANIES.filter((c) => {
        const d = Math.round(
          (new Date(c.expires) - new Date("2026-05-04")) / 86400000,
        );
        return d >= 0 && d <= 30;
      }).length
    }</div></div>
  </div>`;
      };

      window.renovarSub = function (id) {
        const c = COMPANIES.find((x) => x.id === id);
        if (!c) return;
        const novaData = c.plan === "Anual" ? "2027-05-04" : "2026-06-04";
        c.expires = novaData;
        c.active = true;
        alert(`Subscrição de "${c.name}" renovada até ${novaData}`);
        navigateTo("subscricoes");
      };

      /* ===== SUPER: STATS GLOBAIS ===== */
      PAGES["super-stats"] = function (el) {
        el.innerHTML = `
  <div class="page-header">
    <div class="page-title"><i class="fa-solid fa-chart-simple" style="margin-right:8px"></i> Estatísticas Globais</div>
    <div class="page-sub">Visão geral de toda a plataforma BizController</div>
  </div>
  <div class="cards-row cols4">
    <div class="card"><div class="card-title">Total Empresas</div><div class="metric">${COMPANIES.length}</div></div>
    <div class="card"><div class="card-title">Activas</div><div class="metric green">${COMPANIES.filter((c) => c.active).length}</div></div>
    <div class="card"><div class="card-title">Total Vendedores</div><div class="metric blue">${COMPANIES.reduce((s, c) => s + c.vendedores, 0)}</div></div>
    <div class="card"><div class="card-title">MRR</div><div class="metric amber">${fmt(COMPANIES.filter((c) => c.active).reduce((s, c) => s + (c.plan === "Anual" ? 300 : 400), 0))}</div></div>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title">Crescimento de Empresas (últimos 6 meses)</div></div>
    <div class="chart-container"><canvas id="chart-super-trend" role="img" aria-label="Crescimento de empresas">Crescimento de empresas por mês</canvas></div>
  </div>`;
        setTimeout(() => {
          const ctx = document.getElementById("chart-super-trend");
          if (ctx)
            STATE.charts["st"] = new Chart(ctx, {
              type: "bar",
              data: {
                labels: ["Dez", "Jan", "Fev", "Mar", "Abr", "Mai"],
                datasets: [
                  {
                    label: "Plano Mensal",
                    data: [1, 1, 1, 2, 2, 2],
                    backgroundColor: "rgba(0,150,255,0.5)",
                    borderRadius: 4,
                  },
                  {
                    label: "Plano Anual",
                    data: [0, 0, 1, 1, 1, 1],
                    backgroundColor: "rgba(0,212,170,0.5)",
                    borderRadius: 4,
                  },
                ],
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: "#8fa3c0" } } },
                scales: {
                  x: {
                    stacked: true,
                    grid: { color: "rgba(255,255,255,0.05)" },
                    ticks: { color: "#8fa3c0" },
                  },
                  y: {
                    stacked: true,
                    grid: { color: "rgba(255,255,255,0.05)" },
                    ticks: { color: "#8fa3c0", stepSize: 1 },
                  },
                },
              },
            });
        }, 200);
      };
    </script>
  </body>
</html>
